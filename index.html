<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fayadh.web.id - Segera Hadir</title>
    
    <meta name="description" content="Sesuatu yang luar biasa sedang dipersiapkan. Kami sedang merancang pengalaman digital yang baru.">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fayadh.web.id/">
    <meta property="og:title" content="fayadh.web.id - Segera Hadir">
    <meta property="og:description" content="Sesuatu yang luar biasa sedang dipersiapkan di fayadh.web.id. Nantikan kehadiran kami segera!">
    <meta property="og:image" content="https://placehold.co/1200x630/09090b/3b82f6?text=Fayadh.web.id"> 
    
    <link rel="icon" type="image/png" href="https://ui-avatars.com/api/?name=F&background=09090b&color=3b82f6&bold=true&rounded=true">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=F&background=09090b&color=3b82f6&bold=true&size=180">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: pointer; /* Memberi tahu user bisa diklik */
        }

        .glow-effect {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: var(--accent-gradient);
            filter: blur(150px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 0;
            animation: pulse 8s ease-in-out infinite alternate;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            animation: fadeIn 1.5s ease-out forwards;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .gradient-text {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.125rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .contact-btn {
            display: inline-block;
            padding: 0.875rem 2rem;
            background: var(--text-main);
            color: var(--bg-color);
            text-decoration: none;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
        }

        .music-hint {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #475569;
            animation: fadeIn 2s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.15; }
            100% { transform: scale(1.1); opacity: 0.25; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            p { font-size: 1rem; }
            .glow-effect { width: 80vw; height: 80vw; }
        }
    </style>
</head>
<body>

    <div class="glow-effect"></div>

    <div class="container">
        <div class="badge">Sedang Dibangun</div>
        
        <h1>fayadh.<span class="gradient-text">web.id</span></h1>
        
        <p>Sesuatu yang luar biasa sedang dipersiapkan. Kami sedang merancang pengalaman digital yang baru dan akan segera kembali.</p>
        
        <a href="mailto:halo@fayadh.web.id" class="contact-btn">Hubungi Saya</a>

        <div class="music-hint">(Klik di mana saja untuk memutar musik)</div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Script untuk memutar musik saat interaksi pertama agar tidak diblokir browser
        document.body.addEventListener('click', function() {
            var audio = document.getElementById("bg-music");
            if (audio.paused) {
                audio.play();
                document.querySelector('.music-hint').style.display = 'none'; // Sembunyikan teks hint setelah musik main
            }
        });
    </script>

</body>
</html>
