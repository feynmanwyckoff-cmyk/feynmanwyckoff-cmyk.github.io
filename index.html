<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fayadh.web.id - Mission Control</title>
    
    <!-- ================= SEO & META TAGS ================= -->
    <meta name="description" content="Misi baru sedang dipersiapkan. Fayadh.web.id siap meluncur ke orbit digital.">
    
    <!-- ================= OPEN GRAPH (UNTUK WHATSAPP/SOSMED) ================= -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fayadh.web.id/">
    <meta property="og:title" content="fayadh.web.id - Mission Control">
    <meta property="og:description" content="Misi baru sedang dipersiapkan. Fayadh.web.id siap meluncur ke orbit digital.">
    <!-- Menggunakan gambar roket nyata dari Unsplash agar diproses oleh WhatsApp -->
    <meta property="og:image" content="https://images.unsplash.com/photo-1517976487492-5750f3195933?q=80&w=1200&auto=format&fit=crop"> 
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    
    <!-- ================= FAVICON ================= -->
    <!-- Ikon roket (emoji) yang dijadikan favicon agar lebih relevan dengan tema -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">

    <!-- Font & CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --space-black: #050510;
            --starlight: #e2e8f0;
            --neon-blue: #00f0ff;
            --rocket-flame: #ff5e00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--space-black);
            color: var(--starlight);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            /* Latar belakang bintang statis menggunakan radial gradient */
            background-image: radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                              radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.05) 1.5px, transparent 1.5px),
                              radial-gradient(circle at 50% 80%, rgba(0, 240, 255, 0.1) 2px, transparent 2px);
        }

        /* Nebula efek */
        .nebula {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0,240,255,0.15) 0%, rgba(139,92,246,0.05) 50%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
            animation: float 20s ease-in-out infinite alternate;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 650px;
            animation: fadeIn 1.5s ease-out forwards;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 4px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            color: var(--neon-blue);
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.8rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        h1 span {
            color: var(--neon-blue);
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        /* --- Animasi Roket (Tombol Putar Musik) --- */
        .launch-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .launch-control:hover {
            transform: translateY(-5px);
        }

        .rocket-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.5));
            animation: hoverRocket 3s ease-in-out infinite;
        }

        /* Saat roket meluncur (setelah diklik) */
        .launching .rocket-icon {
            animation: blastOff 1.5s ease-in forwards;
        }

        .launch-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: #64748b;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .launch-control:hover .launch-text {
            color: var(--neon-blue);
        }

        /* --- Keyframes --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, -50px) scale(0.9); }
        }

        @keyframes hoverRocket {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        @keyframes blastOff {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            20% { transform: translateY(10px) scale(0.9); } /* Ancang-ancang */
            100% { transform: translateY(-500px) scale(0.5); opacity: 0; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            p { font-size: 1rem; }
            .nebula { width: 90vw; height: 90vw; }
        }
    </style>
</head>
<body>

    <div class="nebula"></div>

    <div class="container">
        <div class="status-badge">🟢 System Offline - Maintenance</div>
        
        <h1>fayadh.<span>web.id</span></h1>
        
        <p>Infrastruktur sedang dikalibrasi. Kami sedang mempersiapkan modul pendaratan baru untuk pengalaman eksplorasi digital yang optimal.</p>
        
        <!-- Tombol interaktif berkedok Roket -->
        <div class="launch-control" id="launchBtn" title="Inisiasi Urutan Peluncuran">
            <div class="rocket-icon" id="rocketIcon">🚀</div>
            <div class="launch-text" id="launchText">Klik untuk Inisiasi Audio</div>
        </div>
    </div>

    <!-- AUDIO PLAYER -->
    <!-- Menggunakan musik ambient space sci-fi -->
    <audio id="bg-music" loop>
        <!-- Audio placeholder ambient space -->
        <source src="https://cdn.pixabay.com/download/audio/2022/02/10/audio_fcb640eb24.mp3?filename=space-ambient-113204.mp3" type="audio/mpeg">
    </audio>

    <script>
        const launchBtn = document.getElementById('launchBtn');
        const launchText = document.getElementById('launchText');
        const audio = document.getElementById("bg-music");
        let isLaunched = false;

        launchBtn.addEventListener('click', function() {
            if (!isLaunched) {
                isLaunched = true;
                
                // Mulai mainkan musik
                audio.play();

                // Tambahkan class animasi meluncur
                launchBtn.classList.add('launching');
                
                // Ubah teks
                launchText.style.color = '#00f0ff';
                launchText.innerText = 'Audio Terhubung. Menuju Orbit...';

                // Kembalikan roket setelah 3 detik dan ubah ikonnya jadi alien/ufo
                setTimeout(() => {
                    launchBtn.classList.remove('launching');
                    document.getElementById('rocketIcon').innerText = '🛸'; // Ganti jadi UFO
                    launchText.innerText = 'Transmisi Sedang Berjalan (Klik untuk Pause)';
                }, 1500);

            } else {
                // Fitur Pause/Play setelah roket meluncur
                if (audio.paused) {
                    audio.play();
                    launchText.innerText = 'Transmisi Sedang Berjalan (Klik untuk Pause)';
                    document.getElementById('rocketIcon').style.animationPlayState = 'running';
                } else {
                    audio.pause();
                    launchText.innerText = 'Transmisi Dijeda (Klik untuk Play)';
                    document.getElementById('rocketIcon').style.animationPlayState = 'paused';
                }
            }
        });
    </script>

</body>
</html>
